<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erro na Verificação</title>

<style>
:root {
    --bg: #0c0e12;
    --card: rgba(255,255,255,.08);
    --border: rgba(255,255,255,.12);
    --danger: #e74c3c;
    --muted: #9aa0a6;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    background:
        radial-gradient(circle at top left, #3b1c1c, transparent 60%),
        radial-gradient(circle at bottom right, #2b0f0f, transparent 60%),
        var(--bg);
    font-family: system-ui, sans-serif;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */

.container {
    width: 94%;
    max-width: 480px;
    background: var(--card);
    backdrop-filter: blur(18px);
    border: 1px solid var(--border);
    border-radius: 26px;
    padding: 38px 32px 34px;
    box-shadow: 0 30px 70px rgba(0,0,0,.65);
    text-align: center;

    opacity: 0;
    transform: translateY(30px);
    animation:
        cardIn .6s cubic-bezier(.16,1,.3,1) forwards,
        shake .45s ease-in-out .6s;
}

/* ICON */

.icon {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: var(--danger);
    margin: 0 auto 18px;
    display: grid;
    place-items: center;
    position: relative;
}

.icon::after {
    content: "×";
    font-size: 54px;
    font-weight: 700;
    line-height: 1;
    position: relative;
    top: 1px;
}

.icon::before {
    content: "";
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid rgba(231,76,60,.5);
    animation: pulse 1.6s infinite;
}

/* FADE SECTIONS */

.fade {
    opacity: 0;
    transform: translateY(10px);
    animation: fadeIn .6s forwards;
}

.fade.delay-1 { animation-delay: .2s; }
.fade.delay-2 { animation-delay: .35s; }
.fade.delay-3 { animation-delay: .5s; }
.fade.delay-4 { animation-delay: .65s; }

/* TEXT */

h1 {
    margin: 0;
    font-size: 1.45rem;
    color: var(--danger);
}

p {
    margin: 14px 0 26px;
    font-size: .95rem;
    color: #ddd;
    word-break: break-word;
}

/* BUTTON */

.btn {
    width: 100%;
    padding: 15px;
    border-radius: 16px;
    border: none;
    font-weight: 600;
    font-size: .95rem;
    cursor: pointer;
    background: #fff;
    color: #000;
    position: relative;
    overflow: hidden;
}

.btn::before {
    content: "";
    position: absolute;
    inset: -2px;
    background: conic-gradient(
        from 0deg,
        transparent,
        rgba(255,255,255,.8),
        transparent
    );
    animation: rotate 2.8s linear infinite;
}

.btn::after {
    content: "";
    position: absolute;
    inset: 2px;
    border-radius: 14px;
    background: #fff;
}

.btn span {
    position: relative;
    z-index: 1;
}

/* FOOTER */

footer {
    margin-top: 22px;
    font-size: .7rem;
    opacity: .7;
}

footer a {
    color: #fff;
    text-decoration: none;
    font-weight: 700;
}

/* ANIMATIONS */

@keyframes cardIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
}

@keyframes rotate {
    to { transform: rotate(360deg); }
}

@keyframes pulse {
    0% { opacity: .6; }
    70% { opacity: 0; }
    100% { opacity: 0; }
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="icon fade delay-1"></div>

    <h1 class="fade delay-2">Falha na Verificação</h1>

    <p class="fade delay-3"><%= error %></p>

    <button class="btn fade delay-4" onclick="location.href='/'">
        <span>Tentar Novamente</span>
    </button>

    <footer class="fade delay-4">
        Made with ☕ by
        <a href="https://discord.com/users/1447028236050759700" target="_blank">
            hyo
        </a>
    </footer>

</div>

</body>
</html>
